  #       env:
  #         UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  #         UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  #         UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  #       with:
  #         unityVersion: 6000.4.9f1
  #         targetPlatform: iOS
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: arfishing-ios-xcodeproj-${{ github.run_number }}
  #         path: build/iOS

# ----------------------------------------------------------------------
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#
#   UNITY_LICENSE              Unity license file contents (XML). Run game-ci/unity-request-activation-file first.
#   UNITY_EMAIL                Unity account email.
#   UNITY_PASSWORD             Unity account password.
#   ANDROID_KEYSTORE_BASE64    base64-encoded keystore file (cat keystore | base64 -w0).
#   ANDROID_KEYSTORE_PASS      Keystore password.
#   ANDROID_KEYALIAS_PASS      Key alias password.
#
# Keystore generation (one-time, run locally then encode):
#   keytool -genkeypair -v -keystore arfishing.keystore \
#     -alias arfishing -keyalg RSA -keysize 2048 -validity 10000
#   base64 -w0 arfishing.keystore > keystore.b64   # paste contents into ANDROID_KEYSTORE_BASE64
#
# See Docs/BuildAndDistribution.html §3.3 for keystore detail.
# ----------------------------------------------------------------------
